name: Scheduled Code Review

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  code-quality-check:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint with stricter rules
        run: |
          yarn lint --max-warnings=10 || echo "Linting completed with warnings"

      - name: Check for TODO/FIXME comments
        run: |
          echo "🔍 Scanning for TODO/FIXME comments..."
          grep -rn "TODO\|FIXME\|XXX\|HACK" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" app/ components/ lib/ hooks/ || echo "No TODO/FIXME comments found"

      - name: Check bundle size
        run: |
          yarn build
          echo "📦 Bundle size analysis:"
          du -sh .next/
          find .next -name "*.js" -exec ls -lh {} \; | sort -k5 -hr | head -20

      - name: Dependency audit
        run: |
          echo "🔒 Running security audit..."
          yarn audit --level moderate || true
          npm audit --audit-level=moderate || true

  outdated-dependencies:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check for outdated packages
        run: |
          echo "📋 Outdated dependencies:"
          yarn outdated || echo "Outdated check completed"

  pr-review-summary:
    name: Weekly PR Review Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate PR Summary
        run: |
          echo "📊 Weekly Code Review Summary"
          echo "=============================="
          echo ""
          echo "Open Pull Requests:"
          gh pr list --state open --json number,title,author,createdAt --jq '.[] | "\(.number): \(.title) by @\(.author.login) - Created: \(.createdAt)"' || echo "Unable to fetch PRs"
          echo ""
          echo "Recently Merged PRs (Last 7 days):"
          gh pr list --state merged --search "merged:>$(date -d '7 days ago' +%Y-%m-%d)" --json number,title,author,mergedAt --jq '.[] | "\(.number): \(.title) by @\(.author.login) - Merged: \(.mergedAt)"' || echo "Unable to fetch merged PRs"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-review-issue:
    name: Create Weekly Review Issue
    runs-on: ubuntu-latest
    needs: [code-quality-check, outdated-dependencies]
    if: always()
    permissions:
      issues: write
    steps:
      - name: Create Review Issue
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const title = `📋 Weekly Code Review - ${date}`;
            const body = `## Weekly Automated Code Review

            This issue was automatically generated by the scheduled code review workflow.

            ### Checks Performed
            - [ ] ESLint analysis
            - [ ] TODO/FIXME comment scan
            - [ ] Bundle size analysis
            - [ ] Security audit
            - [ ] Outdated dependency check

            ### Action Items
            Please review the workflow logs for detailed results:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Next Steps
            1. Address any security vulnerabilities found
            2. Update critical outdated dependencies
            3. Review and resolve TODO/FIXME comments
            4. Optimize bundle size if needed

            ---
            *This issue will be automatically created every Monday.*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['code-review', 'automated', 'maintenance']
            });